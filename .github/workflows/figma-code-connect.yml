name: Figma Code Connect

on:
  push:
    branches: [main]
    paths:
      - 'packages/react/src/**/*.figma.tsx'
      - 'packages/react/figma.config.json'
      - '.github/workflows/figma-code-connect.yml'
  workflow_dispatch:

concurrency:
  group: figma-code-connect
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Parse (validate)
        working-directory: packages/react
        run: pnpm exec figma connect parse

      - name: Publish to Figma
        working-directory: packages/react
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_TOKEN }}
        run: pnpm exec figma connect publish
